name: noor_ayah
description: نور آية - من كل آية.. نور وهداية
publish_to: 'none'
version: 1.0.0
environment:
  sdk: ">=2.19.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # UI & Fonts
  google_fonts: ^6.1.0
  
  # Utilities
  share_plus: ^7.2.1
  # نطاق مرن لدعم Flutter 3.24 (intl 0.19) وأحدث (intl 0.20)
  intl: ">=0.19.0 <0.21.0"
  hijri: ^3.0.0
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  permission_handler: ^11.3.1
  
  # Audio
  just_audio: ^0.9.40
  
  # Screenshot & Image
  screenshot: ^3.0.0
  path_provider: ^2.1.4
  
  # Network
  http: ^1.2.0
  connectivity_plus: ^5.0.2
  
  # Icons
  cupertino_icons: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/data/verses.json
    - assets/data/duas.json
    - assets/images/
    - assets/icon/
  
  fonts:
    # خطوط عربية قرآنية
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs_V22.ttf
    
    - family: ScheherazadeNew
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
        - asset: assets/fonts/ScheherazadeNew-Bold.ttf
          weight: 700
    
    - family: Lateef
      fonts:
        - asset: assets/fonts/Lateef-Regular.ttf
        - asset: assets/fonts/Lateef-Bold.ttf
          weight: 700
    
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    
    - family: IBMPlexArabic
      fonts:
        - asset: assets/fonts/IBMPlexArabic-Regular.ttf
        - asset: assets/fonts/IBMPlexArabic-Bold.ttf
          weight: 700
    
    # خطوط للغة الأردية
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
        - asset: assets/fonts/NotoNastaliqUrdu-Bold.ttf
          weight: 700
    
    # خطوط للغات اللاتينية
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
    
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
